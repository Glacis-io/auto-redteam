name: Bug Report
description: Report a bug in autoredteam
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The CLI command or code you ran.
      placeholder: |
        1. `autoredteam run --provider openai --model gpt-4o-mini`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened. Include error messages or tracebacks if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: autoredteam version
      description: Output of `autoredteam --version` or `pip show glacis-autoredteam`
      placeholder: "0.3.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.5"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.2 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context — config.yaml changes, provider details, etc.
